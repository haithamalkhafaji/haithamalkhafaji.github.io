    // Find the toggle button we created in the menu via its CSS class
    const toggleLinks = document.querySelectorAll('.theme-toggle-handler a, .theme-toggle-handler');
    
    // Check if the user has visited before and preferred dark mode
    const currentTheme = localStorage.getItem('theme');
    if (currentTheme) {
      document.documentElement.setAttribute('data-theme', currentTheme);
    }

    // Add click event listener to the button
    toggleLinks.forEach(link => {
      link.addEventListener('click', function (e) {
        e.preventDefault(); // Stop the '#' link from jumping the page
        
        let theme = document.documentElement.getAttribute('data-theme');
        
        if (theme === 'dark') {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
        }
      });
    });
  });</script></body></html>
